<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #2a5298;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Input Data</h2>

    <form action="/save" method="post" th:object="${user}">
        <input type="text" th:field="*{nama}" placeholder="Nama" required>
        <input type="text" th:field="*{nim}" placeholder="NIM" required>
        <button type="submit">Simpan</button>
    </form>

    <a href="/home">← Kembali ke Home</a>
</div>

</body>
</html>
