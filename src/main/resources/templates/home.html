<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #2a5298;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        th {
            background: #2a5298;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MY Website 20230140206 - Farhad</h2>

    <a href="/form" class="btn">+ Tambah Data</a>

    <table>
        <tr>
            <th>Nama</th>
            <th>NIM</th>
        </tr>

        <tr th:each="u : ${users}">
            <td th:text="${u.nama}"></td>
            <td th:text="${u.nim}"></td>
        </tr>
    </table>
</div>

</body>
</html>
